<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光文化 - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #0a0b18;
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 粒子画布 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 流动光线 */
        .light-line {
            position: fixed;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(92, 158, 255, 0.4), transparent);
            top: 15%;
            left: 0;
            z-index: 0;
            animation: lightFlow 12s linear infinite;
        }
        .light-line:nth-child(2) {
            top: 35%;
            animation-delay: 2s;
        }
        .light-line:nth-child(3) {
            top: 60%;
            animation-delay: 5s;
        }
        .light-line:nth-child(4) {
            top: 85%;
            animation-delay: 8s;
        }

        @keyframes lightFlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 科技网格 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(80,120,255,0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(80,120,255,0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0b18;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .loader-circle {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(92, 158, 255, 0.2);
            border-top: 3px solid #5c9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 880px;
            margin: 40px auto;
            background: rgba(20,25,45,0.7);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100,140,255,0.15);
            box-shadow: 0 0 60px rgba(80,100,200,0.15);
            padding: 50px 35px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 3px;
            background: linear-gradient(90deg, #4a8dff, #9d6fff, #4a8dff);
            border-radius: 3px;
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(100,140,255,0.2);
        }

        .header h1 {
            font-size: 2.4rem;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .header h1 span {
            background: linear-gradient(90deg, #5c9eff, #a77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 1.1rem;
            color: #b0c4de;
            line-height: 1.7;
        }

        .links-section {
            margin-bottom: 45px;
        }

        .links-section h2 {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .links-section h2::before {
            content: "";
            width: 8px; height: 22px;
            background: linear-gradient(180deg, #5c9eff, #9d6fff);
            margin-right: 12px;
            border-radius: 4px;
        }

        .links-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .link-item {
            background: rgba(35,40,70,0.6);
            border-radius: 12px;
            padding: 18px 22px;
            transition: all 0.3s ease;
            border: 1px solid rgba(100,140,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #5c9eff, #9d6fff);
        }

        .link-item:hover {
            transform: translateY(-4px);
            background: rgba(50,60,110,0.6);
            border-color: rgba(120,160,255,0.3);
            box-shadow: 0 8px 20px rgba(80,100,200,0.15);
        }

        .link-item a {
            text-decoration: none;
            color: #e0e6ff;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
        }

        .link-item a::before {
            content: "➤";
            color: #7ba6ff;
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .footer {
            text-align: center;
            margin-top: 45px;
            color: #7080a0;
            font-size: 0.9rem;
            padding-top: 22px;
            border-top: 1px solid rgba(80,100,160,0.15);
        }

        @media (max-width: 768px) {
            .container {
                padding: 35px 20px;
                margin: 20px auto;
            }
            .header h1 {
                font-size: 2rem;
            }
            .links-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- 加载动画 -->
    <div class="loader" id="loader">
        <div class="loader-circle"></div>
    </div>

    <!-- 粒子背景 -->
    <div id="particles"></div>

    <!-- 流动光线 -->
    <div class="light-line"></div>
    <div class="light-line"></div>
    <div class="light-line"></div>
    <div class="light-line"></div>

    <div class="container">
        <div class="header">
            <h1><span>时光文化</span> - 个人主页</h1>
            <p>欢迎来到我的个人主页，这里主要分享数码相关内容，包含NAS、影视、云电脑等实用资源</p>
        </div>

        <div class="links-section">
            <h2>常用资源链接</h2>
            <div class="links-list">
                <div class="link-item"><a href="https://fnos.net/shiguangwenhua">时光文化NAS</a></div>
                <div class="link-item"><a href="http://shiguangwenhua.online:20243">点播影视软件下载</a></div>
                <div class="link-item"><a href="http://shiguangwenhua.online:8088">腾飞云电脑</a></div>
                <div class="link-item"><a href="http://shiguangwenhua.online:3009">时光文化-轻聊</a></div>
                <div class="link-item"><a href="https://github.com/asbk97/asbk97.github.io/blob/main/micoKMS.rar">微软激活计划</a></div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 时光文化 - 个人主页 | 科技与文化相融</p>
        </div>
    </div>

    <!-- 粒子库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // 加载动画
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 800);
        });

        // 粒子背景配置
        particlesJS("particles", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#5c9eff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 120,
                    "color": "#5c9eff",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 1,
                    "direction": "none",
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
